name: tennis_match_pro
description: "Match Point — Tennis Club Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core:         ^3.10.1
  firebase_auth:         ^5.4.1
  cloud_firestore:       ^5.6.1
  firebase_storage:      ^12.4.10
  firebase_messaging:    ^15.2.10
  google_sign_in:        ^6.2.1
  flutter_local_notifications: ^17.2.4
  http:                  ^1.2.0
  geolocator:            ^11.0.0
  google_maps_flutter:   ^2.6.1
  cupertino_icons:       ^1.0.8
  url_launcher:          ^6.2.1
  image_picker:          ^1.1.2
  image_cropper:         ^9.1.0
  share_plus:            ^7.0.0
  path_provider:         ^2.0.0
  google_fonts:          ^6.2.1
  shared_preferences:    ^2.2.3
  async:                 ^2.11.0
  intl:                  ^0.19.0

dependency_overrides:
  image_cropper_platform_interface: <7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0B2218"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/courts/
    - assets/icon/